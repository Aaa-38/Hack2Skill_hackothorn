# Skill normalization map (Pass 1).
#
# Keys are matched case-insensitively against the casefolded, whitespace-cleaned
# skill name. The value is the canonical normalized_name written alongside the
# original (the original `name` is always preserved verbatim).
#
# Any skill not listed here falls back to its casefolded cleaned name, so the
# pipeline never drops a skill — it only canonicalizes known aliases.
mappings:
