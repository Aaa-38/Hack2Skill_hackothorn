# Skill Taxonomy
#
# Maps career domains to the normalized skills (produced by Pass 1).
# Used by Pipeline 3 to infer candidate domain, compute domain relevance,
# and identify out-of-domain (unknown) skills.
# Matches are case-insensitive and against `normalized_name`.

domains:
  backend:
    - python
    - java
    - go
    - c++
    - c#
    - ruby
    - node.js
    - rust
    - django
    - fastapi
    - spring boot
    - postgresql
    - mysql
    - mongodb
    - redis
    - kafka
    - rabbitmq
    - rest
    - graphql
    - grpc
  
